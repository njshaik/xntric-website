<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Admin — XNTRIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    #cms-loading {
      position: fixed; inset: 0;
      background: #1a1714;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #cms-loading .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem; font-weight: 600;
      letter-spacing: 0.15em; color: #f5f0e8;
      margin-bottom: 0.3rem;
    }
    #cms-loading .sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: #c4965a;
      margin-bottom: 2.5rem;
    }
    #cms-loading .spinner {
      width: 28px; height: 28px;
      border: 1.5px solid rgba(245,240,232,0.15);
      border-top-color: #c4965a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="cms-loading">
    <div class="logo">XNTRIC</div>
    <div class="sub">Admin Panel</div>
    <div class="spinner"></div>
  </div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        const loader = document.getElementById('cms-loading');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() { loader.remove(); }, 500);
        }
      }, 1800);
    });
  </script>
</body>
</html>
